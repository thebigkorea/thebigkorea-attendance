<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더큰코리아 출퇴근</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
  background: #f8f5ef;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 24px;
  padding: 26px;
  box-shadow: 0 14px 35px rgba(0,0,0,0.12);
}

.title {
  text-align: center;
  font-size: 34px;
  font-weight: 900;
}

.sub {
  text-align: center;
  color: #777;
  margin-bottom: 28px;
  font-size: 20px;
}

input {
  width: 100%;
  height: 64px;
  margin-top: 12px;
  border-radius: 14px;
  border: 1px solid #ddd;
  padding-left: 18px;
  font-size: 22px;
}

button {
  width: 100%;
  height: 72px;
  border: none;
  border-radius: 18px;
  margin-top: 18px;
  font-size: 26px;
  font-weight: 900;
  transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.08s ease;
  box-shadow: 0 8px 0 rgba(0,0,0,0.16);
  cursor: pointer;
}

button:active {
  transform: translateY(5px) scale(0.98);
  box-shadow: 0 3px 0 rgba(0,0,0,0.18);
  opacity: 0.85;
}

button:disabled {
  opacity: 0.35;
  transform: none;
  box-shadow: none;
}

.btn-main { background: #4a2d18; color: white; }
.btn-in { background: #1e8e3e; color: white; }
.btn-out { background: #d93025; color: white; }

.btn-reset {
  background: #eee2d4;
  color: #4a2d18;
  height: 52px;
  font-size: 17px;
  border-radius: 14px;
  margin-top: 24px;
  box-shadow: none;
  opacity: 0.8;
}

.btn-reset:active {
  transform: translateY(2px) scale(0.99);
  opacity: 0.65;
}

.status {
  text-align: center;
  margin-top: 20px;
  font-size: 20px;
  font-weight: 900;
  color: #4a2d18;
}
</style>
</head>

<body>

<div class="container">

  <div id="register" class="card">
    <div class="title">더큰코리아</div>
    <div class="sub">직원등록</div>

    <input id="name" placeholder="이름">
    <input id="phone" placeholder="전화번호">

    <button class="btn-main" onclick="register()">등록하기</button>
    <div id="regMsg" class="status"></div>
  </div>

  <div id="main" class="card" style="display:none;">
    <div class="title">출퇴근</div>
    <div id="userName" class="sub"></div>

    <button id="inBtn" class="btn-in" onclick="send('출근')">출근</button>
    <button id="outBtn" class="btn-out" onclick="send('퇴근')">퇴근</button>

    <button class="btn-reset" onclick="reset()">직원 정보 다시 등록</button>

    <div id="msg" class="status"></div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzn2wTUIoV-36pVy0DBtAoKyJCXHHfxmAS4A_hOTz4AZhRD-OkFT-FpWbUPVlsDaO3t/exec";

const KEY = "THEBIGKOREA_USER";
const ACTION_KEY = "THEBIGKOREA_ACTION";
const DATE_KEY = "THEBIGKOREA_ACTION_DATE";

window.onload = () => {
  resetDailyIfNeeded();

  const saved = JSON.parse(localStorage.getItem(KEY));
  if (saved) {
    showMain(saved);
  }
};

function todayKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function resetDailyIfNeeded() {
  const savedDate = localStorage.getItem(DATE_KEY);
  const today = todayKey();

  if (savedDate && savedDate !== today) {
    localStorage.removeItem(ACTION_KEY);
    localStorage.removeItem(DATE_KEY);
  }
}

function register() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const regMsg = document.getElementById("regMsg");

  if (!name || !phone) {
    regMsg.innerText = "이름과 전화번호를 입력하세요";
    return;
  }

  const user = { name, phone };
  localStorage.setItem(KEY, JSON.stringify(user));

  showMain(user);
}

function showMain(user) {
  document.getElementById("register").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("userName").innerText = user.name + "님";
  updateBtn();
}

function updateBtn() {
  resetDailyIfNeeded();

  const last = localStorage.getItem(ACTION_KEY);

  const inBtn = document.getElementById("inBtn");
  const outBtn = document.getElementById("outBtn");
  const msg = document.getElementById("msg");

  if (!last) {
    inBtn.disabled = false;
    outBtn.disabled = true;
    msg.innerText = "";
    return;
  }

  if (last === "출근") {
    inBtn.disabled = true;
    outBtn.disabled = false;
    msg.innerText = "출근 완료 · 퇴근 가능";
    return;
  }

  if (last === "퇴근") {
    inBtn.disabled = true;
    outBtn.disabled = true;
    msg.innerText = "오늘 출퇴근 완료";
  }
}

async function send(type) {
  const user = JSON.parse(localStorage.getItem(KEY));
  const msg = document.getElementById("msg");
  const inBtn = document.getElementById("inBtn");
  const outBtn = document.getElementById("outBtn");

  if (!user) {
    msg.innerText = "직원 정보를 다시 등록해주세요";
    return;
  }

  msg.innerText = type + " 처리중...";

  if (type === "출근") inBtn.innerText = "출근 처리중...";
  if (type === "퇴근") outBtn.innerText = "퇴근 처리중...";

  inBtn.disabled = true;
  outBtn.disabled = true;

  try {
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        name: user.name,
        phone: user.phone,
        type: type,
        store: "더큰코리아",
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent
      })
    });

    localStorage.setItem(ACTION_KEY, type);
    localStorage.setItem(DATE_KEY, todayKey());

    msg.innerText = type + " 완료되었습니다";

  } catch (e) {
    msg.innerText = "오류가 발생했습니다. 다시 시도해주세요";
  }

  inBtn.innerText = "출근";
  outBtn.innerText = "퇴근";

  updateBtn();
}

function reset() {
  if (!confirm("직원 정보를 다시 등록하시겠습니까?")) return;

  localStorage.removeItem(KEY);
  localStorage.removeItem(ACTION_KEY);
  localStorage.removeItem(DATE_KEY);

  location.reload();
}
</script>

</body>
</html>
