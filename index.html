<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0,
    maximum-scale=1.0, user-scalable=no"
  >

  <title>더큰코리아 출퇴근</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Noto Sans KR",
        "Malgun Gothic",
        sans-serif;
      background: #f5f1e8;
      color: #222;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      background: #fff;
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .logo {
      text-align: center;
      font-size: 34px;
      font-weight: 900;
      color: #5b2c16;
      margin-bottom: 8px;
    }

    .store {
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: #777;
      margin-bottom: 26px;
    }

    .title {
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 22px;
    }

    .desc {
      text-align: center;
      font-size: 17px;
      line-height: 1.6;
      color: #666;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      height: 64px;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 0 18px;
      font-size: 23px;
      margin-bottom: 20px;
      outline: none;
    }

    button {
      width: 100%;
      height: 72px;
      border: none;
      border-radius: 20px;
      font-size: 25px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 14px;
      transition:
        transform 0.08s ease,
        box-shadow 0.08s ease,
        opacity 0.08s ease;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.22);
    }

    button:active {
      transform: translateY(6px) scale(0.98);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.22);
      opacity: 0.88;
    }

    button:disabled {
      transform: none !important;
      box-shadow: none !important;
      opacity: 0.65;
    }

    .btn-register {
      background: #6b3519;
      color: #fff;
    }

    .btn-login {
      background: #1f5f99;
      color: #fff;
    }

    .btn-in {
      background: #0f8a4b;
      color: #fff;
    }

    .btn-out {
      background: #b3261e;
      color: #fff;
    }

    .btn-reset {
      background: #eee;
      color: #333;
      font-size: 18px;
      height: 56px;
    }

    .btn-disabled {
      background: #ccc !important;
      color: #777 !important;
      cursor: not-allowed;
    }

    .employee-box {
      background: #f8f4ed;
      padding: 24px;
      border-radius: 18px;
      margin-bottom: 22px;
      text-align: center;
      border: 1px solid #eadfce;
    }

    .employee-name {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .employee-phone {
      font-size: 22px;
      font-weight: 900;
      color: #333;
    }

    .status {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: #f3f3f3;
      color: #333;
      font-size: 18px;
      line-height: 1.5;
      text-align: center;
      min-height: 60px;
      white-space: pre-line;
    }

    .hidden {
      display: none !important;
    }

    .loading-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #5b2c16;
      margin: 0 auto 18px;
      animation: pulse 1s infinite ease-in-out;
    }

    @keyframes pulse {
      0% {
        opacity: 0.3;
        transform: scale(0.9);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
      }

      100% {
        opacity: 0.3;
        transform: scale(0.9);
      }
    }
  </style>
</head>

<body>

  <div class="wrap">
    <div class="card">

      <div class="logo">더큰코리아</div>
      <div class="store">본사 출퇴근 관리</div>

      <div id="loadingScreen">
        <div class="loading-dot"></div>
        <div class="title">앱 실행 중...</div>
        <div class="desc">
          직원 정보를 확인하고 있습니다.
        </div>
      </div>

      <div id="homeScreen" class="hidden">
        <div class="title">출퇴근 앱</div>

        <div class="desc">
          처음 사용하는 직원은 직원등록을,<br>
          이미 등록한 직원은 로그인을 눌러주세요.
        </div>

        <button
          class="btn-register"
          onclick="showRegisterScreen()"
        >
          직원 등록
        </button>

        <button
          class="btn-login"
          onclick="showLoginScreen()"
        >
          로그인
        </button>
      </div>

      <div id="registerScreen" class="hidden">
        <div class="title">직원 등록</div>

        <label>매장명</label>

        <input
          id="regStoreInput"
          type="text"
          value="더큰코리아"
          readonly
        >

        <label>직원명</label>

        <input
          id="regNameInput"
          type="text"
          placeholder="예: 홍길동"
        >

        <label>전화번호</label>

        <input
          id="regPhoneInput"
          type="tel"
          placeholder="예: 01012345678"
        >

        <button
          id="registerBtn"
          class="btn-register"
          onclick="registerEmployee()"
        >
          직원 등록
        </button>

        <button
          class="btn-reset"
          onclick="showHomeScreen()"
        >
          처음으로
        </button>

        <div
          id="registerStatus"
          class="status hidden"
        ></div>
      </div>

      <div id="loginScreen" class="hidden">
        <div class="title">로그인</div>

        <label>매장명</label>

        <input
          id="loginStoreInput"
          type="text"
          value="더큰코리아"
          readonly
        >

        <label>직원명</label>

        <input
          id="loginNameInput"
          type="text"
          placeholder="예: 홍길동"
        >

        <label>전화번호</label>

        <input
          id="loginPhoneInput"
          type="tel"
          placeholder="예: 01012345678"
        >

        <button
          id="loginBtn"
          class="btn-login"
          onclick="loginEmployee()"
        >
          로그인
        </button>

        <button
          class="btn-reset"
          onclick="showHomeScreen()"
        >
          처음으로
        </button>

        <div
          id="loginStatus"
          class="status hidden"
        ></div>
      </div>

      <div id="attendanceScreen" class="hidden">
        <div class="title">출퇴근 체크</div>

        <div class="employee-box">
          <div
            id="employeeName"
            class="employee-name"
          ></div>

          <div
            id="employeePhone"
            class="employee-phone"
          ></div>
        </div>

        <button
          id="checkInBtn"
          class="btn-in"
          onclick="submitAttendance('출근')"
        >
          출근
        </button>

        <button
          id="checkOutBtn"
          class="btn-out"
          onclick="submitAttendance('퇴근')"
        >
          퇴근
        </button>

        <button
          class="btn-reset"
          onclick="logoutEmployee()"
        >
          로그아웃 / 직원 변경
        </button>

        <div
          id="attendanceStatus"
          class="status"
        >
          출근 버튼을 눌러주세요.
        </div>
      </div>

    </div>
  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbzRL0MceE5NfdEro8Og1VnjLhTc-pcCXKl0d3hXV8u8A3mNoRBBrTEfGdMtp2ohotWx/exec";

    let currentEmployee = {
      store: "",
      name: "",
      phone: "",
      primaryKey: "",
      token: ""
    };


    window.onload = function() {
      showLoadingScreen();

      setTimeout(function() {
        const savedToken =
          localStorage.getItem("dtk_token");

        if (!savedToken) {
          showHomeScreen();
          return;
        }

        apiRequest({
          action: "getEmployeeByToken",
          token: savedToken
        })
        .then(function(result) {
          if (!result || !result.exists) {
            clearEmployee();
            showHomeScreen();
            return;
          }

          currentEmployee = {
            store: result.store,
            name: result.name,
            phone: result.phone,
            primaryKey: result.primaryKey,
            token: result.token
          };

          saveEmployee(currentEmployee);
          showAttendanceScreen();
          loadTodayStatus();
        })
        .catch(function() {
          showHomeScreen();
        });
      }, 700);
    };


    function registerEmployee() {
      const store =
        document
          .getElementById("regStoreInput")
          .value
          .trim();

      const name =
        document
          .getElementById("regNameInput")
          .value
          .trim();

      const phone =
        normalizePhone(
          document
            .getElementById("regPhoneInput")
            .value
        );

      if (!store || !name || !phone) {
        showRegisterStatus(
          "매장명, 직원명, 전화번호를 모두 입력해주세요."
        );
        return;
      }

      setButtonLoading(
        "registerBtn",
        "등록 중..."
      );

      apiRequest({
        action: "registerEmployee",
        store: store,
        name: name,
        phone: phone,
        userAgent: navigator.userAgent
      })
      .then(function(result) {
        resetButton(
          "registerBtn",
          "직원 등록"
        );

        if (!result || !result.success) {
          showRegisterStatus(
            result && result.message
              ? result.message
              : "등록에 실패했습니다."
          );
          return;
        }

        const employee =
          result.employee || result;

        currentEmployee = {
          store:
            employee.store ||
            "더큰코리아 본사",

          name:
            employee.name,

          phone:
            employee.phone,

          primaryKey:
            employee.primaryKey ||
            employee.key ||
            result.primaryKey ||
            result.token,

          token:
            employee.token ||
            employee.key ||
            result.token
        };

        saveEmployee(currentEmployee);
        showAttendanceScreen();
        updateButtons(false, false);

        showAttendanceStatus(
          "등록 완료되었습니다.\n출근 버튼을 눌러주세요."
        );
      })
      .catch(function() {
        resetButton(
          "registerBtn",
          "직원 등록"
        );

        showRegisterStatus(
          "오류가 발생했습니다. 잠시 후 다시 시도해주세요."
        );
      });
    }


    function loginEmployee() {
      const store =
        document
          .getElementById("loginStoreInput")
          .value
          .trim();

      const name =
        document
          .getElementById("loginNameInput")
          .value
          .trim();

      const phone =
        normalizePhone(
          document
            .getElementById("loginPhoneInput")
            .value
        );

      if (!store || !name || !phone) {
        showLoginStatus(
          "매장명, 직원명, 전화번호를 모두 입력해주세요."
        );
        return;
      }

      setButtonLoading(
        "loginBtn",
        "로그인 중..."
      );

      apiRequest({
        action: "loginEmployee",
        store: store,
        name: name,
        phone: phone,
        userAgent: navigator.userAgent
      })
      .then(function(result) {
        resetButton(
          "loginBtn",
          "로그인"
        );

        if (!result || !result.success) {
          showLoginStatus(
            result && result.message
              ? result.message
              : "로그인에 실패했습니다."
          );
          return;
        }

        const employee =
          result.employee || result;

        currentEmployee = {
          store:
            employee.store ||
            "더큰코리아 본사",

          name:
            employee.name,

          phone:
            employee.phone,

          primaryKey:
            employee.primaryKey ||
            employee.key ||
            result.primaryKey ||
            result.token,

          token:
            employee.token ||
            employee.key ||
            result.token
        };

        saveEmployee(currentEmployee);
        showAttendanceScreen();
        loadTodayStatus();
      })
      .catch(function() {
        resetButton(
          "loginBtn",
          "로그인"
        );

        showLoginStatus(
          "오류가 발생했습니다. 잠시 후 다시 시도해주세요."
        );
      });
    }


    function submitAttendance(type) {
      if (!currentEmployee.token) {
        showAttendanceStatus(
          "직원 정보가 없습니다. 다시 로그인해주세요."
        );
        return;
      }

      const buttonId =
        type === "출근"
          ? "checkInBtn"
          : "checkOutBtn";

      setButtonLoading(
        buttonId,
        type + " 처리중..."
      );

      apiRequest({
        action: "submitAttendance",
        token: currentEmployee.token,
        type: type,
        timestamp:
          new Date().toLocaleString("ko-KR"),
        userAgent: navigator.userAgent
      })
      .then(function(result) {
        resetButtonText();

        showAttendanceStatus(
          result && result.message
            ? result.message
            : ""
        );

        if (result && result.success) {
          if (type === "출근") {
            updateButtons(true, false);
          } else {
            updateButtons(true, true);
          }

          return;
        }

        loadTodayStatus();
      })
      .catch(function() {
        resetButtonText();

        showAttendanceStatus(
          "오류가 발생했습니다. 잠시 후 다시 시도해주세요."
        );

        loadTodayStatus();
      });
    }


    function loadTodayStatus() {
      apiRequest({
        action: "getTodayAttendanceStatus",
        primaryKey: currentEmployee.primaryKey
      })
      .then(function(result) {
        if (!result || !result.success) {
          showAttendanceStatus(
            result && result.message
              ? result.message
              : "오늘 출퇴근 상태를 확인할 수 없습니다."
          );
          return;
        }

        updateButtons(
          result.hasCheckIn,
          result.hasCheckOut
        );
      })
      .catch(function() {
        showAttendanceStatus(
          "출퇴근 상태 확인 중 오류가 발생했습니다."
        );
      });
    }


    function updateButtons(
      hasCheckIn,
      hasCheckOut
    ) {
      const checkInButton =
        document.getElementById("checkInBtn");

      const checkOutButton =
        document.getElementById("checkOutBtn");

      resetButtonText();

      checkInButton.disabled = false;
      checkOutButton.disabled = false;

      checkInButton
        .classList
        .remove("btn-disabled");

      checkOutButton
        .classList
        .remove("btn-disabled");

      if (hasCheckIn) {
        checkInButton.disabled = true;

        checkInButton
          .classList
          .add("btn-disabled");
      }

      if (!hasCheckIn || hasCheckOut) {
        checkOutButton.disabled = true;

        checkOutButton
          .classList
          .add("btn-disabled");
      }

      if (!hasCheckIn) {
        showAttendanceStatus(
          "아직 출근 전입니다."
        );
      } else if (
        hasCheckIn &&
        !hasCheckOut
      ) {
        showAttendanceStatus(
          "출근 처리되었습니다.\n퇴근 버튼을 사용할 수 있습니다."
        );
      } else {
        showAttendanceStatus(
          "오늘 출근과 퇴근이 모두 처리되었습니다."
        );
      }
    }


    function apiRequest(data) {
      return fetch(API_URL, {
        method: "POST",
        mode: "cors",

        headers: {
          "Content-Type":
            "text/plain;charset=utf-8"
        },

        body: JSON.stringify(data)
      })
      .then(function(response) {
        if (!response.ok) {
          throw new Error(
            "HTTP 오류: " +
            response.status
          );
        }

        return response.json();
      });
    }


    function saveEmployee(employee) {
      localStorage.setItem(
        "dtk_store",
        employee.store
      );

      localStorage.setItem(
        "dtk_name",
        employee.name
      );

      localStorage.setItem(
        "dtk_phone",
        employee.phone
      );

      localStorage.setItem(
        "dtk_primaryKey",
        employee.primaryKey
      );

      localStorage.setItem(
        "dtk_token",
        employee.token
      );
    }


    function clearEmployee() {
      localStorage.removeItem("dtk_store");
      localStorage.removeItem("dtk_name");
      localStorage.removeItem("dtk_phone");
      localStorage.removeItem("dtk_primaryKey");
      localStorage.removeItem("dtk_token");
    }


    function logoutEmployee() {
      clearEmployee();

      currentEmployee = {
        store: "",
        name: "",
        phone: "",
        primaryKey: "",
        token: ""
      };

      showHomeScreen();
    }


    function setButtonLoading(
      id,
      text
    ) {
      const button =
        document.getElementById(id);

      button.innerText = text;
      button.disabled = true;
    }


    function resetButton(
      id,
      text
    ) {
      const button =
        document.getElementById(id);

      button.innerText = text;
      button.disabled = false;
    }


    function resetButtonText() {
      resetButton(
        "checkInBtn",
        "출근"
      );

      resetButton(
        "checkOutBtn",
        "퇴근"
      );
    }


    function showLoadingScreen() {
      hideAll();

      document
        .getElementById("loadingScreen")
        .classList
        .remove("hidden");
    }


    function showHomeScreen() {
      hideAll();

      document
        .getElementById("homeScreen")
        .classList
        .remove("hidden");
    }


    function showRegisterScreen() {
      hideAll();

      document
        .getElementById("registerScreen")
        .classList
        .remove("hidden");
    }


    function showLoginScreen() {
      hideAll();

      document
        .getElementById("loginScreen")
        .classList
        .remove("hidden");
    }


    function showAttendanceScreen() {
      hideAll();

      document
        .getElementById("attendanceScreen")
        .classList
        .remove("hidden");

      document
        .getElementById("employeeName")
        .innerText =
          currentEmployee.name;

      document
        .getElementById("employeePhone")
        .innerText =
          formatPhone(
            currentEmployee.phone
          );
    }


    function hideAll() {
      document
        .getElementById("loadingScreen")
        .classList
        .add("hidden");

      document
        .getElementById("homeScreen")
        .classList
        .add("hidden");

      document
        .getElementById("registerScreen")
        .classList
        .add("hidden");

      document
        .getElementById("loginScreen")
        .classList
        .add("hidden");

      document
        .getElementById("attendanceScreen")
        .classList
        .add("hidden");
    }


    function showRegisterStatus(message) {
      const box =
        document.getElementById(
          "registerStatus"
        );

      box.classList.remove("hidden");
      box.innerText = message;
    }


    function showLoginStatus(message) {
      const box =
        document.getElementById(
          "loginStatus"
        );

      box.classList.remove("hidden");
      box.innerText = message;
    }


    function showAttendanceStatus(message) {
      document
        .getElementById("attendanceStatus")
        .innerText = message;
    }


    function normalizePhone(phone) {
      return String(phone || "")
        .replace(/[^0-9]/g, "");
    }


    function formatPhone(phone) {
      const value =
        normalizePhone(phone);

      if (value.length === 11) {
        return value.replace(
          /(\d{3})(\d{4})(\d{4})/,
          "$1-$2-$3"
        );
      }

      return value;
    }
  </script>
</body>
</html>
